environment:
  base:
    apps:
    - class: webapp
      health_check_command: '[ \$(echo url=\$(jupyter lab list | head -n 2 | tail
        -n 1 | cut -f1 -d'' '' | grep -v ''Currently'' | sed "s@/?@/lab?@g") | curl
        -o /dev/null -s -w ''%{http_code}'' --config -) == ''200'' ]'
      icon_url: ''
      logfile_path: ''
      name: jupyterlab
      start_command: jupyter lab --allow-root --port 8888 --ip 0.0.0.0 --no-browser
        --NotebookApp.base_url=\$PROXY_PREFIX --NotebookApp.default_url=/lab --NotebookApp.allow_origin='*'
      stop_command: jupyter lab stop 8888
      timeout_seconds: 60
      type: jupyterlab
      user_msg: ''
      webapp_options:
        autolaunch: true
        port: '8888'
        proxy:
          trim_prefix: false
        url_command: jupyter lab list | head -n 2 | tail -n 1 | cut -f1 -d' ' | grep
          -v 'Currently'
    build_timestamp: '20241001182612'
    cuda_version: ''
    description: A Python Base with Jupyterlab
    entrypoint_script: ''
    icon_url: https://workbench.download.nvidia.com/static/img/ai-workbench-icon-rectangle.jpg
    image: nvidia/ai-workbench/python-basic:1.0.2
    image_version: 1.0.5
    labels:
    - ubuntu
    - python3
    - jupyterlab
    name: Python Basic
    os: linux
    os_distro: ubuntu
    os_distro_release: '22.04'
    package_manager_environment:
      name: ''
      target: ''
    package_managers:
    - binary_path: /usr/bin/apt
      installed_packages:
      - curl
      - git
      - git-lfs
      - python3
      - gcc
      - python3-dev
      - python3-pip
      - vim
      name: apt
    - binary_path: /usr/bin/pip
      installed_packages:
      - jupyterlab==4.2.4
      name: pip
    programming_languages:
    - python3
    registry: nvcr.io
    schema_version: v2
    supported_architectures: []
    user_info:
      gid: ''
      uid: ''
      username: ''
execution:
  apps: []
  mounts:
  - description: Project directory
    options: rw
    target: /project/
    type: project
  resources:
    gpu:
      requested: 0
    sharedMemoryMB: 0
  secrets: []
layout:
- path: src/
  storage: git
  type: code
- path: data/
  storage: git
  type: code
- path: docs/
  storage: git
  type: code
- path: notebooks/
  storage: git
  type: code
- path: deploy/
  storage: git
  type: code
meta:
  createdOn: '2024-12-06T19:19:11Z'
  defaultBranch: main
  description: ''
  image: project-ai-virtual-assistant
  labels: []
  name: ai-virtual-assistant
specMinorVersion: 2
specVersion: v2
